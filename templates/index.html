<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>viviok messenger</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #ffffff; --accent: #ff6600; --chat-bg: #151515; }
        [data-theme="light"] { --bg: #f0f2f5; --panel: #ffffff; --text: #121212; --accent: #ff5500; --chat-bg: #e5e5e5; }
        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; }
        
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #splash h1 { color: var(--accent); font-size: 2.5rem; letter-spacing: 2px; }

        .screen { display: none; max-width: 800px; margin: 30px auto; padding: 20px; background: var(--panel); border: 3px solid var(--accent); border-radius: 12px; }
        .active { display: block; }

        input, button { padding: 12px; border: 2px solid var(--text); border-radius: 6px; background: transparent; color: var(--text); font-weight: bold; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; }
        
        .theme-toggle { position: absolute; top: 15px; right: 15px; background: var(--panel); border: 1px solid var(--accent); color: var(--text); padding: 5px 10px; border-radius: 4px;}

        /* ТГ структура: Колонки */
        .messenger-container { display: flex; gap: 15px; height: 500px; margin-top: 10px; }
        .sidebar { width: 35%; border-right: 2px solid var(--accent); padding-right: 15px; display: flex; flex-direction: column; }
        .chat-area { width: 65%; display: flex; flex-direction: column; background: var(--chat-bg); padding: 10px; border-radius: 8px; }

        /* Список чатов */
        .chats-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .chat-item { display: flex; align-items: center; padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; }
        .chat-item:hover, .chat-item.selected { background: rgba(255, 102, 0, 0.2); border: 1px solid var(--accent); }
        .chat-item img { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; object-fit: cover; }

        /* Окно сообщений */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { display: flex; align-items: flex-start; margin: 5px 0; }
        .msg.my-msg { flex-direction: row-reverse; }
        .msg img.av { width: 35px; height: 35px; border-radius: 50%; margin: 0 8px; border: 1px solid var(--accent); object-fit: cover; }
        .msg-body { background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 10px; max-width: 70%; }
        .my-msg .msg-body { background: var(--accent); color: white; }
        .sticker-img { max-width: 100px; display: block; border-radius: 4px; }

        .sticker-panel { border-top: 1px dashed var(--accent); padding-top: 5px; margin-top: 5px; }
        .sticker-list { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; }
        .st-thumb { width: 40px; height: 40px; object-fit: cover; cursor: pointer; border-radius: 4px; }
        .file-label { display: block; text-align: center; padding: 8px; border: 2px dashed var(--accent); cursor: pointer; border-radius: 6px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Тема</button>

    <div id="splash">
        <h1>DEVELOPER: ВИВИOK</h1>
        <p>Загрузка личных диалогов...</p>
    </div>

    <div id="reg-screen" class="screen" style="max-width: 400px;">
        <h2 style="color: var(--accent); text-align: center;">ВХОД</h2>
        <label class="file-label">📸 Аватарка из галереи
            <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
        </label>
        <img id="avatar-preview" style="width:60px; height:60px; border-radius:50%; display:none; margin:10px auto; object-fit:cover;">
        <input type="text" id="username-input" style="width:100%" placeholder="Твой уникальный ник...">
        <button onclick="tryRegister()" style="width:100%; margin-top:10px;">Создать аккаунт</button>
    </div>

    <div id="chat-screen" class="screen">
        <h3 style="margin: 0 0 10px 0;">viviok Мессенджер | Вы: <span id="my-name" style="color:var(--accent);"></span></h3>
        
        <div class="messenger-container">
            <div class="sidebar">
                <div style="display: flex; gap: 4px;">
                    <input type="text" id="search-input" style="width:70%; padding:6px;" placeholder="Ник друга...">
                    <button onclick="searchContact()" style="width:30%; padding:6px; font-size:0.8rem;">Найти</button>
                </div>
                <div class="chats-list" id="chats-list-container">
                    </div>
            </div>

            <div class="chat-area">
                <div id="active-chat-header" style="font-weight: bold; border-bottom: 1px solid var(--accent); padding-bottom: 5px; margin-bottom: 5px;">
                    Выбери или найди чат слева...
                </div>
                
                <div id="chat-box"></div>
                
                <div id="input-row" style="display: flex; gap: 5px; display: none;">
                    <input type="text" id="msg-input" style="flex-grow: 1;" placeholder="Напишите сообщение...">
                    <button onclick="sendMsg()">➔</button>
                </div>

                <div class="sticker-panel" id="sticker-area" style="display:none;">
                    <div class="sticker-list" id="stickers-container"></div>
                    <label class="file-label" style="padding: 3px;">➕ Стикер <input type="file" accept="image/*" style="display:none;" onchange="addCustomSticker(this)"></label>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myUsername = localStorage.getItem('vivi_user') || '';
        let myAvatar = localStorage.getItem('vivi_avatar') || '';
        let customStickers = JSON.parse(localStorage.getItem('vivi_stickers')) || [];
        let chatPartners = JSON.parse(localStorage.getItem('vivi_partners')) || {}; // {username: avatar}
        let currentChatUser = '';
        let lastMessagesCount = 0; // Для отслеживания изменений без моргания

        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            if (myUsername) {
                setupMessenger();
            } else {
                showScreen('reg-screen');
            }
        }, 2200);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    myAvatar = e.target.result;
                    let img = document.getElementById('avatar-preview');
                    img.src = myAvatar; img.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function tryRegister() {
            let user = document.getElementById('username-input').value.trim();
            if(!user) return alert("Введите имя!");
            let res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, avatar: myAvatar })
            });
            if (res.status === 200) {
                myUsername = user;
                localStorage.setItem('vivi_user', user);
                localStorage.setItem('vivi_avatar', myAvatar);
                setupMessenger();
            } else {
                let data = await res.json(); alert(data.message);
            }
        }

        function setupMessenger() {
            document.getElementById('my-name').innerText = myUsername;
            showScreen('chat-screen');
            renderChatsList();
            renderStickers();
            // Цикл обновления сообщений
            setInterval(loadMessages, 1000);
        }

        // Поиск контакта
        async function searchContact() {
            let targetUser = document.getElementById('search-input').value.trim();
            if(!targetUser || targetUser === myUsername) return alert("Неверный юзернейм");
            
            let res = await fetch('/search_user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: targetUser })
            });
            let data = await res.json();
            if(res.status === 200) {
                chatPartners[data.username] = data.avatar;
                localStorage.setItem('vivi_partners', JSON.stringify(chatPartners));
                renderChatsList();
                openChat(data.username);
                document.getElementById('search-input').value = '';
            } else {
                alert(data.message);
            }
        }

        function renderChatsList() {
            let container = document.getElementById('chats-list-container');
            container.innerHTML = '';
            Object.keys(chatPartners).forEach(username => {
                let av = chatPartners[username] || 'https://www.w3schools.com/howto/img_avatar.png';
                let sel = username === currentChatUser ? 'selected' : '';
                container.innerHTML += `
                    <div class="chat-item ${sel}" onclick="openChat('${username}')">
                        <img src="${av}">
                        <span>${username}</span>
                    </div>
                `;
            });
        }

        function openChat(username) {
            currentChatUser = username;
            lastMessagesCount = 0; // Сбрасываем счетчик, чтобы принудительно отрисовать новый чат
            document.getElementById('active-chat-header').innerText = `Чат с: ${username}`;
            document.getElementById('input-row').style.display = 'flex';
            document.getElementById('sticker-area').style.display = 'block';
            document.getElementById('chat-box').innerHTML = ''; // Очищаем старый экран
            renderChatsList();
            loadMessages();
        }

        // Загрузка сообщений БЕЗ МОРГАНИЯ
        async function loadMessages() {
            if(!currentChatUser) return;
            let res = await fetch('/get_private_messages', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser })
            });
            let messages = await res.json();
            
            // Если количество сообщений не изменилось, ничего не перерисовываем (нет моргания!)
            if (messages.length === lastMessagesCount) return;
            
            let box = document.getElementById('chat-box');
            box.innerHTML = ''; // Очищаем только при реальном обновлении
            
            messages.forEach(m => {
                let isMe = m.from === myUsername;
                let cName = isMe ? 'msg my-msg' : 'msg';
                let avSrc = m.avatar || 'https://www.w3schools.com/howto/img_avatar.png';
                let content = m.is_sticker ? `<img src="${m.text}" class="sticker-img">` : `<div>${m.text}</div>`;
                
                box.innerHTML += `
                    <div class="${cName}">
                        <img src="${avSrc}" class="av">
                        <div class="msg-body">${content}</div>
                    </div>
                `;
            });
            box.scrollTop = box.scrollHeight;
            lastMessagesCount = messages.length;
        }

        async function sendMsg() {
            let text = document.getElementById('msg-input').value.trim();
            if(!text || !currentChatUser) return;
            document.getElementById('msg-input').value = '';
            await fetch('/send_private_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ from: myUsername, to: currentChatUser, text: text, is_sticker: false })
            });
            loadMessages();
        }

        async function sendSticker(base64) {
            if(!currentChatUser) return;
            await fetch('/send_private_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ from: myUsername, to: currentChatUser, text: base64, is_sticker: true })
            });
            loadMessages();
        }

        function addCustomSticker(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    customStickers.push(e.target.result);
                    localStorage.setItem('vivi_stickers', JSON.stringify(customStickers));
                    renderStickers();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderStickers() {
            let container = document.getElementById('stickers-container');
            container.innerHTML = '';
            customStickers.forEach(st => {
                let img = document.createElement('img'); img.src = st; img.className = 'st-thumb';
                img.onclick = () => sendSticker(st); container.appendChild(img);
            });
        }

        function toggleTheme() {
            let current = document.body.getAttribute('data-theme');
            let next = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('vivi_theme', next);
        }
        if(localStorage.getItem('vivi_theme')) document.body.setAttribute('data-theme', localStorage.getItem('vivi_theme'));
    </script>
</body>
</html>
