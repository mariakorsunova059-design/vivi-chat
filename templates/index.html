<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>viviok messenger</title>
    <style>
        :root { --bg: #0b0e14; --panel: #151c26; --text: #ffffff; --accent: #ff6600; --chat-bg: #080a0f; --msg-in: #202b36; }
        [data-theme="light"] { --bg: #f0f2f5; --panel: #ffffff; --text: #121212; --accent: #ff5500; --chat-bg: #e5e7eb; --msg-in: #ffffff; }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow: hidden; width: 100vw; height: 100vh; }
        
        /* Черная заставка */
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        #splash h1 { color: var(--accent); font-size: 2.2rem; font-family: 'Courier New', monospace; letter-spacing: 2px; margin: 0 0 10px 0; }

        /* Полноэкранные мобильные блоки */
        .screen { display: none; position: fixed; inset: 0; width: 100vw; height: 100vh; background: var(--bg); flex-direction: column; }
        .screen.active { display: flex; }

        /* Мобильная шапка */
        .header { background: var(--panel); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,102,0,0.15); min-height: 55px; z-index: 10; }
        .header-title { font-weight: bold; font-size: 1.1rem; display: flex; flex-direction: column; flex: 1; margin-left: 10px; }
        .sub-status { font-size: 0.75rem; color: #888; margin-top: 2px; }
        .sub-status.online { color: #00ff66; font-weight: bold; }

        input, button { padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text); font-size: 0.95rem; }
        [data-theme="light"] input { background: #fff; border: 1px solid #ccc; color: #000; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .theme-toggle { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 4px; }

        /* Список диалогов на весь экран телефона */
        .chats-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { display: flex; align-items: center; padding: 12px; background: var(--panel); border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,102,0,0.05); cursor: pointer; }
        .chat-item img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; object-fit: cover; border: 1px solid var(--accent); }
        .chat-info { display: flex; flex-direction: column; }
        .chat-info .name { font-weight: bold; font-size: 1rem; }

        /* Рабочая область чата */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; overflow: hidden; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        
        /* Мобильные аккуратные облачка сообщений */
        .msg { display: flex; align-items: flex-end; margin: 5px 0; max-width: 85%; }
        .msg.my-msg { align-self: flex-end; flex-direction: row-reverse; }
        .msg:not(.my-msg) { align-self: flex-start; }
        .msg img.av { width: 32px; height: 32px; border-radius: 50%; margin: 0 8px; object-fit: cover; border: 1px solid var(--accent); }
        .msg-body { background: var(--msg-in); padding: 10px 14px; border-radius: 16px 16px 16px 4px; font-size: 0.95rem; line-height: 1.35; box-shadow: 0 1px 2px rgba(0,0,0,0.15); word-break: break-word; }
        .my-msg .msg-body { background: var(--accent); color: white; border-radius: 16px 16px 4px 16px; }
        .sticker-img { max-width: 140px; height: auto; display: block; border-radius: 8px; }

        /* Панель клавиатуры/ввода внизу смартфона */
        .input-panel { background: var(--panel); padding: 10px; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid rgba(255,102,0,0.1); }
        
        /* Верхняя зона совместного видео */
        #video-container { width: 100%; height: 230px; background: #000; display: none; position: relative; border-bottom: 2px solid var(--accent); }
        #video-frame { width: 100%; height: 100%; border: none; }
        .video-bar { background: rgba(0,0,0,0.85); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #fff; font-weight: bold; }

        .sticker-list { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; }
        .st-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .file-label { text-align: center; padding: 6px 10px; border: 1px dashed var(--accent); cursor: pointer; border-radius: 6px; font-size: 0.75rem; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <h1>DEVELOPER: ВИВИOK</h1>
        <p style="color:#666; font-size:0.9rem; font-family: monospace;">mobile core v2.0 загрузка...</p>
    </div>

    <div id="reg-screen" class="screen" style="justify-content: center; padding: 20px;">
        <h2 style="color: var(--accent); text-align: center; margin-bottom: 5px; font-family: 'Courier New', monospace;">viviok messenger</h2>
        <p style="text-align:center; color:#777; font-size:0.85rem; margin-bottom:25px;">Мобильная версия</p>
        
        <label class="file-label" style="padding:15px; font-size:0.95rem; margin-bottom:10px; text-align:center;">📸 Выбрать аватарку из галереи
            <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
        </label>
        <img id="avatar-preview" style="width:80px; height:80px; border-radius:50%; display:none; margin:10px auto 20px auto; object-fit:cover; border:2px solid var(--accent);">
        
        <input type="text" id="username-input" placeholder="Придумай свой ник...">
        <button onclick="tryRegister()" style="margin-top:15px; padding:14px; font-size:1rem;">Создать аккаунт</button>
        <button class="theme-toggle" onclick="toggleTheme()" style="margin-top:25px; align-self:center;">🌓 Сменить тему</button>
    </div>

    <div id="list-screen" class="screen">
        <div class="header">
            <div class="header-title" style="margin-left:0;">Диалоги</div>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>
        <div style="padding: 10px; display: flex; gap: 6px; background: var(--panel);">
            <input type="text" id="search-input" style="flex:1; padding:10px;" placeholder="Введи точный ник друга...">
            <button onclick="searchContact()" style="padding:10px 15px;">Найти</button>
        </div>
        <div class="chats-list" id="chats-list-container"></div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header">
            <button onclick="closeChat()" style="background:transparent; font-size:1.3rem; padding:0 10px 0 5px;">⬅</button>
            <div class="header-title">
                <span id="active-chat-user">Чат</span>
                <span id="active-chat-status" class="sub-status">офлайн</span>
            </div>
            <button onclick="promptVideoUrl()" style="background:transparent; font-size:1.3rem; padding:0 5px;">🎬</button>
        </div>

        <div id="video-container">
            <div class="video-bar">
                <span id="video-status-text">🍿 Совместный плеер</span>
                <button onclick="closeVideo()" style="background:none; color:#ff3333; font-size:0.8rem; border:none; padding:0; font-weight:bold;">[Закрыть]</button>
            </div>
            <iframe id="video-frame" src=""></iframe>
            <div style="background:#05070a; padding:6px; display:flex; gap:12px; justify-content:center; border-top:1px solid rgba(255,102,0,0.15);">
                <button onclick="sendVideoStatus('Поставил(а) на паузу ⏸️')" style="padding:5px 12px; font-size:0.75rem; background:#222;">Пауза ⏸️</button>
                <button onclick="sendVideoStatus('Включил(а) видео! ▶️')" style="padding:5px 12px; font-size:0.75rem;">Пуск ▶️</button>
            </div>
        </div>

        <div class="chat-main">
            <div id="chat-box"></div>
            
            <div class="input-panel">
                <div style="display: flex; gap: 6px;">
                    <input type="text" id="msg-input" style="flex:1; padding:12px;" placeholder="Сообщение...">
                    <button onclick="sendMsg()" style="padding:12px 20px;">➔</button>
                </div>
                <div style="display:flex; align-items:center; gap:8px; margin-top:2px; overflow:hidden;">
                    <label class="file-label" style="padding:5px 10px; flex-shrink:0;">➕ Стикер<input type="file" accept="image/*" style="display:none;" onchange="addCustomSticker(this)"></label>
                    <div class="sticker-list" id="stickers-container"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav" preload="auto"></audio>

    <script>
        let myUsername = localStorage.getItem('vivi_user') || '';
        let myAvatar = localStorage.getItem('vivi_avatar') || '';
        let customStickers = JSON.parse(localStorage.getItem('vivi_stickers')) || [];
        let chatPartners = JSON.parse(localStorage.getItem('vivi_partners')) || {}; 
        
        let currentChatUser = '';
        let lastMessagesCount = 0;
        let currentVideoUrl = '';

        // Показ главного экрана после заставки
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            if (myUsername) {
                setupMessenger();
            } else {
                showScreen('reg-screen');
            }
        }, 2200);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    myAvatar = e.target.result;
                    let img = document.getElementById('avatar-preview');
                    img.src = myAvatar; img.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function tryRegister() {
            let user = document.getElementById('username-input').value.trim();
            if(!user) return alert("Введите имя!");
            let res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, avatar: myAvatar })
            });
            if (res.status === 200) {
                myUsername = user;
                localStorage.setItem('vivi_user', user);
                localStorage.setItem('vivi_avatar', myAvatar);
                setupMessenger();
            } else {
                let data = await res.json(); alert(data.message);
            }
        }

        function setupMessenger() {
            showScreen('list-screen');
            renderChatsList();
            renderStickers();
            
            // Непрерывный фоновый пинг, чтобы сервер всегда знал, что мы Онлайн
            setInterval(sendPing, 2000);
            sendPing();

            // Постоянный цикл обновления сообщений и онлайна друга
            setInterval(mainUpdateCycle, 1500);
        }

        async function sendPing() {
            if (!myUsername) return;
            await fetch('/ping', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: myUsername, avatar: myAvatar })
            });
        }

        async function mainUpdateCycle() {
            if (currentChatUser) {
                // Обновляем статус Онлайн / Время захода
                let res = await fetch('/search_user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: currentChatUser })
                });
                let data = await res.json();
                if (data.status === "success") {
                    let statusEl = document.getElementById('active-chat-status');
                    if (data.online) {
                        statusEl.innerText = "онлайн";
                        statusEl.className = "sub-status online";
                    } else {
                        let date = new Date(data.last_seen * 1000);
                        statusEl.innerText = `был(а) в сети в ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                        statusEl.className = "sub-status";
                    }
                }
                loadMessages();
            }
        }

        async function searchContact() {
            let targetUser = document.getElementById('search-input').value.trim();
            if(!targetUser || targetUser === myUsername) return alert("Недопустимый ник");
            
            let res = await fetch('/search_user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: targetUser })
            });
            let data = await res.json();
            if(res.status === 200) {
                chatPartners[data.username] = data.avatar;
                localStorage.setItem('vivi_partners', JSON.stringify(chatPartners));
                renderChatsList();
                openChat(data.username);
                document.getElementById('search-input').value = '';
            } else {
                alert(data.message);
            }
        }

        function renderChatsList() {
            let container = document.getElementById('chats-list-container');
            if(!container) return;
            container.innerHTML = '';
            
            let keys = Object.keys(chatPartners);
            if(keys.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#555; margin-top:40px; font-size:0.9rem;">У вас пока нет диалогов.<br>Найдите друга по нику выше!</p>`;
                return;
            }
            
            keys.forEach(username => {
                let av = chatPartners[username] || 'https://www.w3schools.com/howto/img_avatar.png';
                container.innerHTML += `
                    <div class="chat-item" onclick="openChat('${username}')">
                        <img src="${av}">
                        <div class="chat-info">
                            <span class="name">${username}</span>
                        </div>
                    </div>
                `;
            });
        }

        function openChat(username) {
            currentChatUser = username;
            lastMessagesCount = 0;
            document.getElementById('active-chat-user').innerText = username;
            document.getElementById('chat-box').innerHTML = '';
            showScreen('chat-screen');
            loadMessages();
        }

        function closeChat() {
            currentChatUser = '';
            closeVideo();
            showScreen('list-screen');
            renderChatsList();
        }

        async function loadMessages() {
            if(!currentChatUser) return;
            let res = await fetch('/get_private_messages', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser })
            });
            let data = await res.json();
            let messages = data.messages;
            let video = data.video;

            // Логика подтягивания совместного видео
            if (video && video.url) {
                if (currentVideoUrl !== video.url) {
                    currentVideoUrl = video.url;
                    document.getElementById('video-frame').src = video.url;
                    document.getElementById('video-container').style.display = 'block';
                }
                if (video.status) {
                    document.getElementById('video-status-text').innerText = `🎬 Друг: ${video.status}`;
                }
            } else {
                document.getElementById('video-container').style.display = 'none';
                document.getElementById('video-frame').src = '';
                currentVideoUrl = '';
            }

            // Плавное добавление сообщений БЕЗ МОРГАНИЯ экрана
            if (messages.length === lastMessagesCount) return;
            
            // Если появилось новое входящее сообщение от друга — играем звук
            if (messages.length > lastMessagesCount && lastMessagesCount > 0) {
                let lastMsg = messages[messages.length - 1];
                if (lastMsg.from !== myUsername) {
                    document.getElementById('msg-sound').play().catch(()=>{});
                }
            }

            let box = document.getElementById('chat-box');
            box.innerHTML = '';
            
            messages.forEach(m => {
                let isMe = m.from === myUsername;
                let cName = isMe ? 'msg my-msg' : 'msg';
                let avSrc = m.avatar || 'https://www.w3schools.com/howto/img_avatar.png';
                let content = m.is_sticker ? `<img src="${m.text}" class="sticker-img">` : `<div>${m.text}</div>`;
                
                box.innerHTML += `
                    <div class="${cName}">
                        ${!isMe ? `<img src="${avSrc}" class="av">` : ''}
                        <div class="msg-body">${content}</div>
                    </div>
                `;
            });
            box.scrollTop = box.scrollHeight;
            lastMessagesCount = messages.length;
        }

        async function sendMsg() {
            let text = document.getElementById('msg-input').value.trim();
            if(!text || !currentChatUser) return;
            document.getElementById('msg-input').value = '';
            await fetch('/send_private_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ from: myUsername, to: currentChatUser, text: text, is_sticker: false })
            });
            loadMessages();
        }

        async function sendSticker(base64) {
            if(!currentChatUser) return;
            await fetch('/send_private_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ from: myUsername, to: currentChatUser, text: base64, is_sticker: true })
            });
            loadMessages();
        }

        /* Функции совместного видео */
        async function promptVideoUrl() {
            let url = prompt("Вставь ссылку на видео или страницу сайта для совместного просмотра:");
            if(!url) return;
            await fetch('/share_video', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser, url: url, status: "Запустил(а) видео! 🍿" })
            });
        }

        async function sendVideoStatus(statusText) {
            if(!currentVideoUrl) return;
            await fetch('/share_video', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser, url: currentVideoUrl, status: statusText })
            });
        }

        async function closeVideo() {
            if(!currentChatUser) return;
            await fetch('/share_video', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser, url: "", status: "" })
            });
        }

        function addCustomSticker(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    customStickers.push(e.target.result);
                    localStorage.setItem('vivi_stickers', JSON.stringify(customStickers));
                    renderStickers();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderStickers() {
            let container = document.getElementById('stickers-container');
            if(!container) return;
            container.innerHTML = '';
            customStickers.forEach(st => {
                let img = document.createElement('img'); img.src = st; img.className = 'st-thumb';
                img.onclick = () => sendSticker(st); container.appendChild(img);
            });
        }

        function toggleTheme() {
            let current = document.body.getAttribute('data-theme');
            let next = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('vivi_theme', next);
        }
        if(localStorage.getItem('vivi_theme')) document.body.setAttribute('data-theme', localStorage.getItem('vivi_theme'));
    </script>
</body>
</html>
