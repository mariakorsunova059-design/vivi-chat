<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>viviok messenger</title>
    <style>
        :root { 
            --bg: #0b0e14; 
            --panel: #151c26; 
            --text: #ffffff; 
            --accent: #3a4454; 
            --chat-bg: #080a0f; 
            --msg-in: #202b36; 
        }
        [data-theme="light"] { 
            --bg: #f4f5f7; 
            --panel: #ffffff; 
            --text: #121212; 
            --accent: #d1d5db; 
            --chat-bg: #e5e7eb; 
            --msg-in: #ffffff; 
        }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        
        html, body { background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; overflow: hidden; width: 100vw; height: 100%; position: fixed; left: 0; top: 0; }
        
        /* Заставка */
        #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        #splash h1 { color: var(--accent); font-size: 2.2rem; font-family: 'Courier New', monospace; letter-spacing: 2px; margin: 0 0 10px 0; }

        /* Полноэкранные блоки */
        .screen { display: none; position: absolute; left: 0; top: 0; width: 100vw; background: var(--bg); flex-direction: column; overflow: hidden; }
        .screen.active { display: flex; }

        /* Шапка */
        .header { background: var(--panel); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); min-height: 55px; z-index: 10; flex-shrink: 0; }
        .header-title { font-weight: bold; font-size: 1.1rem; display: flex; flex-direction: column; flex: 1; margin-left: 10px; }
        .sub-status { font-size: 0.75rem; color: #888; margin-top: 2px; }
        .sub-status.online { color: #00ff66; font-weight: bold; }

        input, button { padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--text); font-size: 0.95rem; }
        [data-theme="light"] input { background: #fff; border: 1px solid #ccc; color: #000; }
        [data-theme="light"] button { color: #121212; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .icon-btn { background: transparent; border: none; font-size: 1.3rem; cursor: pointer; padding: 4px; color: var(--text); }

        /* Список чатов */
        .chats-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { display: flex; align-items: center; padding: 12px; background: var(--panel); border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.02); cursor: pointer; }
        .chat-item img { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; object-fit: cover; }

        /* Настройки */
        .settings-profile { display: flex; flex-direction: column; align-items: center; padding: 25px 10px; background: var(--panel); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .settings-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; }
        .settings-name { font-size: 1.3rem; font-weight: bold; margin-bottom: 4px; }
        .settings-username { font-size: 0.9rem; color: #888; }
        .settings-menu { padding: 15px 10px; display: flex; flex-direction: column; gap: 8px; }
        .settings-option { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: var(--panel); border-radius: 10px; font-size: 0.95rem; cursor: pointer; }

        /* Чат-зона */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; overflow: hidden; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        
        /* Сообщения */
        .msg { display: flex; align-items: flex-end; margin: 6px 0; max-width: 85%; }
        .msg.my-msg { align-self: flex-end; flex-direction: row; }
        .msg:not(.my-msg) { align-self: start; }
        .msg img.av { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .msg:not(.my-msg) img.av { margin-right: 8px; }
        .msg.my-msg img.av { margin-left: 8px; order: 2; }
        
        .msg-body { background: var(--msg-in); padding: 10px 14px; border-radius: 16px 16px 16px 4px; font-size: 0.95rem; line-height: 1.35; box-shadow: 0 1px 2px rgba(0,0,0,0.15); word-break: break-word; order: 1; }
        .my-msg .msg-body { background: var(--accent); color: white; border-radius: 16px 16px 4px 16px; }
        [data-theme="light"] .my-msg .msg-body { color: #121212; }
        
        .sticker-img { max-width: 140px; height: auto; display: block; border-radius: 0; }

        /* Панель ввода */
        .input-panel { background: var(--panel); padding: 10px 10px calc(12px + env(safe-area-inset-bottom, 0px)) 10px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 20; flex-shrink: 0; }
        .input-row { display: flex; gap: 6px; align-items: center; width: 100%; }
        
        /* Шторка стикеров */
        .sticker-drawer { position: absolute; bottom: -280px; left: 0; width: 100%; height: 240px; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.08); z-index: 19; display: flex; flex-direction: column; padding: 10px; transition: bottom 0.2s ease-out; }
        .sticker-drawer.open { bottom: 100%; }
        .sticker-drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .sticker-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; align-content: start; }
        .st-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; }

        /* Убираем крестик очистки в инпутах типа search */
        input[type="search"]::-webkit-search-decoration,
        input[type="search"]::-webkit-search-cancel-button,
        input[type="search"]::-webkit-search-results-button,
        input[type="search"]::-webkit-search-results-decoration { display: none; }

        /* Видео */
        #video-container { width: 100%; height: 180px; background: #000; display: none; position: relative; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        #video-frame { width: 100%; height: 100%; border: none; }
        .video-bar { background: rgba(0,0,0,0.85); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #fff; }

        .file-label { text-align: center; padding: 6px 10px; border: 1px dashed var(--accent); cursor: pointer; border-radius: 6px; font-size: 0.75rem; color: var(--text); font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <h1>DEVELOPER:  ВИВИOK</h1>
        <p style="color:#666; font-size:0.9rem; font-family: monospace;">mobile core v3.0 загрузка...</p>
    </div>

    <div id="reg-screen" class="screen" style="justify-content: center; padding: 20px;">
        <h2 style="color: var(--text); text-align: center; margin-bottom: 5px; font-family: 'Courier New', monospace;">viviok messenger</h2>
        <p style="text-align:center; color:#777; font-size:0.85rem; margin-bottom:25px;">Мобильная версия</p>
        
        <label class="file-label" style="padding:15px; font-size:0.95rem; margin-bottom:10px; text-align:center;">📸 Загрузить аватарку из галереи
            <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
        </label>
        <img id="avatar-preview" style="width:80px; height:80px; border-radius:50%; display:none; margin:10px auto 20px auto; object-fit:cover;">
        
        <input type="search" id="username-input" autocomplete="off" placeholder="Придумай свой ник...">
        <button onclick="tryRegister()" style="margin-top:15px; padding:14px; font-size:1rem;">Создать аккаунт</button>
    </div>

    <div id="list-screen" class="screen">
        <div class="header">
            <div class="header-title" style="margin-left:0;">Диалоги</div>
            <button class="icon-btn" onclick="openSettings()">⚙️</button>
        </div>
        <div style="padding: 10px; display: flex; gap: 6px; background: var(--panel);">
            <input type="search" id="search-input" autocomplete="off" style="flex:1; padding:10px;" placeholder="Введи точный ник друга...">
            <button onclick="searchContact()" style="padding:10px 15px;">Найти</button>
        </div>
        <div class="chats-list" id="chats-list-container"></div>
    </div>

    <div id="settings-screen" class="screen">
        <div class="header">
            <button onclick="closeSettings()" class="icon-btn">⬅</button>
            <div class="header-title" style="margin-left:10px;">Настройки</div>
        </div>
        <div class="settings-profile">
            <img id="set-av-display" class="settings-avatar" src="https://www.w3schools.com/howto/img_avatar.png">
            <span id="set-name-display" class="settings-name">Имя</span>
            <span id="set-user-display" class="settings-username">@юзернейм</span>
        </div>
        <div class="settings-menu">
            <div class="settings-option" onclick="changeDisplayNamePrompt()">
                <span>✏️ Изменить отображаемое имя</span>
                <span style="color:#666;">➔</span>
            </div>
            <label class="settings-option" style="cursor:pointer; margin:0;">
                <span>📸 Обновить аватарку</span>
                <span style="color:#666;">➔</span>
                <input type="file" accept="image/*" style="display:none;" onchange="updateAvatarFromSettings(this)">
            </label>
            <div class="settings-option" onclick="toggleTheme()">
                <span>🌓 Сменить тему оформления</span>
                <span style="color:#666;">➔</span>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header">
            <button onclick="closeChat()" class="icon-btn" style="padding:0 10px 0 5px;">⬅</button>
            <div class="header-title">
                <span id="active-chat-user">Чат</span>
                <span id="active-chat-status" class="sub-status">офлайн</span>
            </div>
            <button onclick="promptVideoUrl()" class="icon-btn" style="padding:0 5px;">🎬</button>
        </div>

        <div id="video-container">
            <div class="video-bar">
                <span id="video-status-text">🍿 Совместный плеер</span>
                <button onclick="closeVideo()" style="background:none; color:#ff3333; border:none; font-weight:bold;">[X]</button>
            </div>
            <iframe id="video-frame" src=""></iframe>
            <div style="background:#05070a; padding:6px; display:flex; gap:12px; justify-content:center;">
                <button onclick="sendVideoStatus('Поставил(а) на паузу ⏸️')" style="padding:4px 10px; font-size:0.75rem; background:#222; color:#fff;">Пауза ⏸️</button>
                <button onclick="sendVideoStatus('Включил(а) видео! ▶️')" style="padding:4px 10px; font-size:0.75rem;">Пуск ▶️</button>
            </div>
        </div>

        <div class="chat-main">
            <div id="chat-box" onclick="toggleStickers(false)"></div>
            
            <div id="sticker-drawer" class="sticker-drawer">
                <div class="sticker-drawer-header">
                    <span style="font-size:0.85rem; font-weight:bold; color:#888;">Ваши кастомные стикеры</span>
                    <label class="file-label">➕ Создать стикер<input type="file" accept="image/*" style="display:none;" onchange="addCustomSticker(this)"></label>
                </div>
                <div class="sticker-grid" id="stickers-grid-container"></div>
            </div>

            <div class="input-panel">
                <div class="input-row">
                    <button type="button" onclick="toggleStickers()" style="background:transparent; font-size:1.3rem; padding:4px; color: var(--text); opacity:0.6;">😊</button>
                    <input type="search" id="msg-input" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" style="flex:1; padding:10px;" placeholder="Сообщение..." onclick="toggleStickers(false)" onkeydown="if(event.key==='Enter') { sendMsg(); event.preventDefault(); }">
                    <button type="button" ontouchstart="sendMsg(); event.preventDefault();" onclick="sendMsg();" style="padding:10px 15px;">➔</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav" preload="auto"></audio>

    <script>
        let myUsername = localStorage.getItem('vivi_user') || '';
        let myDisplayName = localStorage.getItem('vivi_display_name') || '';
        let myAvatar = localStorage.getItem('vivi_avatar') || '';
        let customStickers = JSON.parse(localStorage.getItem('vivi_stickers')) || [];
        let chatPartners = JSON.parse(localStorage.getItem('vivi_partners')) || {}; 
        
        let currentChatUser = '';
        let lastMessagesCount = 0;
        let currentVideoUrl = '';

        function resizeApp() {
            let h = window.innerHeight;
            document.querySelectorAll('.screen').forEach(s => s.style.height = h + 'px');
        }
        window.addEventListener('resize', resizeApp);
        window.addEventListener('orientationchange', resizeApp);

        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            resizeApp();
            if (myUsername) {
                if(!myDisplayName) myDisplayName = myUsername;
                setupMessenger();
            } else {
                showScreen('reg-screen');
            }
        }, 2200);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            resizeApp();
            if(id === 'chat-screen') fixScroll();
        }

        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    myAvatar = e.target.result;
                    let img = document.getElementById('avatar-preview');
                    img.src = myAvatar; img.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function tryRegister() {
            let user = document.getElementById('username-input').value.trim();
            if(!user) return alert("Введите имя!");
            let res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, avatar: myAvatar })
            });
            if (res.status === 200) {
                myUsername = user;
                myDisplayName = user;
                localStorage.setItem('vivi_user', user);
                localStorage.setItem('vivi_display_name', user);
                localStorage.setItem('vivi_avatar', myAvatar);
                setupMessenger();
            } else {
                let data = await res.json(); alert(data.message);
            }
        }

        function setupMessenger() {
            showScreen('list-screen');
            renderChatsList();
            renderStickers();
            setInterval(sendPing, 2000);
            sendPing();
            setInterval(mainUpdateCycle, 1500);
        }

        async function sendPing() {
            if (!myUsername) return;
            await fetch('/ping', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: myUsername, avatar: myAvatar })
            });
        }

        function openSettings() {
            document.getElementById('set-av-display').src = myAvatar || 'https://www.w3schools.com/howto/img_avatar.png';
            document.getElementById('set-name-display').innerText = myDisplayName;
            document.getElementById('set-user-display').innerText = '@' + myUsername;
            showScreen('settings-screen');
        }

        function closeSettings() {
            showScreen('list-screen');
        }

        function changeDisplayNamePrompt() {
            let newName = prompt("Введите новое отображаемое имя:", myDisplayName);
            if(newName && newName.trim()) {
                myDisplayName = newName.trim();
                localStorage.setItem('vivi_display_name', myDisplayName);
                document.getElementById('set-name-display').innerText = myDisplayName;
            }
        }

        function updateAvatarFromSettings(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    myAvatar = e.target.result;
                    localStorage.setItem('vivi_avatar', myAvatar);
                    document.getElementById('set-av-display').src = myAvatar;
                    sendPing();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function mainUpdateCycle() {
            if (currentChatUser) {
                let res = await fetch('/search_user', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: currentChatUser })
                });
                let data = await res.json();
                if (data.status === "success") {
                    let statusEl = document.getElementById('active-chat-status');
                    if (data.online) {
                        statusEl.innerText = "онлайн";
                        statusEl.className = "sub-status online";
                    } else {
                        let date = new Date(data.last_seen * 1000);
                        statusEl.innerText = `был(а) в сети в ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                        statusEl.className = "sub-status";
                    }
                }
                loadMessages();
            }
        }

        async function searchContact() {
            let targetUser = document.getElementById('search-input').value.trim();
            if(!targetUser || targetUser === myUsername) return alert("Недопустимый ник");
            
            let res = await fetch('/search_user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: targetUser })
            });
            let data = await res.json();
            if(res.status === 200) {
                chatPartners[data.username] = data.avatar;
                localStorage.setItem('vivi_partners', JSON.stringify(chatPartners));
                renderChatsList();
                openChat(data.username);
                document.getElementById('search-input').value = '';
            } else {
                alert(data.message);
            }
        }

        function renderChatsList() {
            let container = document.getElementById('chats-list-container');
            if(!container) return; container.innerHTML = '';
            let keys = Object.keys(chatPartners);
            if(keys.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#555; margin-top:40px; font-size:0.9rem;">У вас пока нет диалогов.<br>Найдите друга по нику выше!</p>`;
                return;
            }
            keys.forEach(username => {
                let av = chatPartners[username] || 'https://www.w3schools.com/howto/img_avatar.png';
                container.innerHTML += `
                    <div class="chat-item" onclick="openChat('${username}')">
                        <img src="${av}">
                        <div class="chat-info"><span class="name">${username}</span></div>
                    </div>
                `;
            });
        }

        function openChat(username) {
            currentChatUser = username;
            lastMessagesCount = 0;
            document.getElementById('active-chat-user').innerText = username;
            document.getElementById('chat-box').innerHTML = '';
            toggleStickers(false);
            showScreen('chat-screen');
            loadMessages();
        }

        function closeChat() {
            currentChatUser = '';
            closeVideo();
            toggleStickers(false);
            showScreen('list-screen');
            renderChatsList();
        }

        async function loadMessages() {
            if(!currentChatUser) return;
            let res = await fetch('/get_private_messages', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser })
            });
            let data = await res.json();
            let messages = data.messages;
            let video = data.video;

            if (video && video.url) {
                if (currentVideoUrl !== video.url) {
                    currentVideoUrl = video.url;
                    document.getElementById('video-frame').src = video.url;
                    document.getElementById('video-container').style.display = 'block';
                }
                if (video.status) document.getElementById('video-status-text').innerText = `🎬 Друг: ${video.status}`;
            } else {
                document.getElementById('video-container').style.display = 'none';
                document.getElementById('video-frame').src = '';
                currentVideoUrl = '';
            }

            if (messages.length === lastMessagesCount) return;
            
            if (messages.length > lastMessagesCount && lastMessagesCount > 0) {
                let lastMsg = messages[messages.length - 1];
                if (lastMsg.from !== myUsername) {
                    document.getElementById('msg-sound').play().catch(()=>{});
                }
            }

            let box = document.getElementById('chat-box');
            box.innerHTML = '';
            
            messages.forEach(m => {
                let isMe = m.from === myUsername;
                let cName = isMe ? 'msg my-msg' : 'msg';
                let avSrc = m.avatar || 'https://www.w3schools.com/howto/img_avatar.png';
                let content = m.is_sticker ? `<img src="${m.text}" class="sticker-img">` : `<div>${m.text}</div>`;
                
                box.innerHTML += `
                    <div class="${cName}">
                        <img src="${avSrc}" class="av">
                        <div class="msg-body">${content}</div>
                    </div>
                `;
            });
            fixScroll();
            lastMessagesCount = messages.length;
        }

        function fixScroll() {
            let box = document.getElementById('chat-box');
            if(box) box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            let textEl = document.getElementById('msg-input');
            let text = textEl.value.trim();
            if(!text || !currentChatUser) return;
            textEl.value = '';
            
            // Принудительно возвращаем фокус полю ввода
            setTimeout(() => { textEl.focus(); }, 10);
            
            await fetch('/send_private_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ from: myUsername, to: currentChatUser, text: text, is_sticker: false })
            });
            loadMessages();
        }

        async function sendSticker(base64) {
            if(!currentChatUser) return;
            toggleStickers(false);
            await fetch('/send_private_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ from: myUsername, to: currentChatUser, text: base64, is_sticker: true })
            });
            loadMessages();
        }

        function toggleStickers(forceState) {
            let drawer = document.getElementById('sticker-drawer');
            if (forceState !== undefined) {
                if (forceState) drawer.classList.add('open');
                else drawer.classList.remove('open');
            } else {
                drawer.classList.toggle('open');
            }
        }

        async function promptVideoUrl() {
            let url = prompt("Вставь ссылку на видео или страницу сайта для совместного просмотра:");
            if(!url) return;
            await fetch('/share_video', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser, url: url, status: "Запустил(а) видео! 🍿" })
            });
        }

        async function sendVideoStatus(statusText) {
            if(!currentVideoUrl) return;
            await fetch('/share_video', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser, url: currentVideoUrl, status: statusText })
            });
        }

        async function closeVideo() {
            if(!currentChatUser) return;
            await fetch('/share_video', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ me: myUsername, with_user: currentChatUser, url: "", status: "" })
            });
        }

        function addCustomSticker(input) {
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    customStickers.push(e.target.result);
                    localStorage.setItem('vivi_stickers', JSON.stringify(customStickers));
                    renderStickers();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderStickers() {
            let container = document.getElementById('stickers-grid-container');
            if(!container) return; container.innerHTML = '';
            customStickers.forEach(st => {
                let img = document.createElement('img'); img.src = st; img.className = 'st-thumb';
                img.onclick = () => sendSticker(st);
                container.appendChild(img);
            });
        }

        function toggleTheme() {
            let current = document.body.getAttribute('data-theme');
            let next = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', next);
            localStorage.setItem('vivi_theme', next);
        }
        if(localStorage.getItem('vivi_theme')) document.body.setAttribute('data-theme', localStorage.getItem('vivi_theme'));
    </script>
</body>
</html>
